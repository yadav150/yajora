<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="16"/>
  <!-- Small leaf icon -->
  <g transform="translate(200, 160) scale(0.6)">
    <path d="M0,-80 C40,-40 60,0 40,40 C20,80 -20,80 -40,40 C-60,0 -40,-40 0,-80Z" 
          fill="#2b7a4b" opacity="0.2"/>
    <path d="M0,-60 C30,-30 40,0 25,25 C10,50 -10,50 -25,25 C-40,0 -30,-30 0,-60Z" 
          fill="#3a9d5e" opacity="0.4"/>
    <line x1="0" y1="-60" x2="0" y2="30" stroke="#2b7a4b" stroke-width="3" opacity="0.3"/>
  </g>
  <!-- Yajora wordmark -->
  <text x="200" y="280" font-family="system-ui, -apple-system, sans-serif" 
        font-size="48" font-weight="600" fill="#2d3748" text-anchor="middle" 
        letter-spacing="2">Yajora</text>
  <text x="200" y="320" font-family="system-ui, -apple-system, sans-serif" 
        font-size="18" font-weight="300" fill="#718096" text-anchor="middle">
    Grocery Marketplace
  </text>
</svg>
